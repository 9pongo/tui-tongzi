<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>推筒子 Ⅱ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Microsoft JhengHei','PingFang TC',sans-serif;
  background:#1a1208;
  min-height:100dvh;
  display:flex;justify-content:center;
  overflow-x:hidden;
}

/* ── GAME WRAP ── */
#game{
  width:100%;max-width:440px;
  min-height:100dvh;
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

/* ── TOP BAR ── */
#topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 12px;
  background:rgba(0,0,0,.72);
  color:#fff;font-size:11px;
  flex-shrink:0;z-index:20;
}
.menu-icon{font-size:22px;cursor:pointer;color:#ffd700;line-height:1}
.bet-info{text-align:right;line-height:1.7;color:#ffe}
.bet-info span{color:#ffd700;font-weight:bold}

/* ── MAP AREA ── */
/*
 * 容器寬高比 1254:1100 → 更高的顯示區域（原圖顯示到約 y=1099）
 * 讓三門有足夠下移空間，overflow:hidden 自然裁底
 */
#map-area{
  position:relative;
  width:100%;
  aspect-ratio:1254/1100;
  flex-shrink:0;
  overflow:hidden;
}
#bg-img{
  width:100%;
  height:auto;   /* 原圖 1:1，自然撐高 → 底部被 overflow:hidden 裁掉 */
  margin-top:0;
  display:block;
  user-select:none;pointer-events:none;
}

/* ── CARD SLOTS (absolute on map) ── */
.slot{
  position:absolute;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;
  align-items:center;gap:3px;
  cursor:default;
  z-index:10;
}
/* semi-transparent dark backing card */
.slot-panel{
  background:rgba(10,8,4,.62);
  border:1.5px solid rgba(255,215,0,.3);
  border-radius:8px;
  padding:4px clamp(4px,1.8vw,8px) 5px;
  display:flex;flex-direction:column;
  align-items:center;gap:3px;
  backdrop-filter:blur(2px);
}
.slot.bettable .slot-panel{cursor:pointer}
.slot.bettable .slot-panel:active{background:rgba(255,200,80,.15)}

.slot-label{
  font-size:10px;color:rgba(255,220,160,.85);
  letter-spacing:1px;font-weight:bold;
  text-shadow:0 1px 3px rgba(0,0,0,.9);
  line-height:1;
}
.slot-label.dealer-lbl{color:rgba(255,180,80,.9)}

.slot-cards{
  display:flex;gap:clamp(2px,1vw,4px);
  min-height:clamp(40px,12.3vw,52px);align-items:center;justify-content:center;
}
.slot-score{
  font-size:11px;color:#ffd;min-height:14px;
  text-align:center;
  text-shadow:0 1px 3px rgba(0,0,0,.9);
}
.slot-bet-box{
  background:rgba(0,0,0,.7);
  border-radius:6px;
  min-width:clamp(38px,11vw,48px);text-align:center;
  padding:2px clamp(4px,1.6vw,7px);
  font-size:clamp(11px,3.1vw,13px);font-weight:bold;
  color:#ffd700;
  border:1px solid rgba(255,215,0,.3);
}

/* result badge */
.result-badge{
  position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:26px;font-weight:900;
  pointer-events:none;z-index:20;
  text-shadow:0 2px 8px rgba(0,0,0,.9);
  animation:badge-pop .4s ease forwards;
}
.result-badge.win{color:#ff4444}
.result-badge.lose{color:#44dd44}
@keyframes badge-pop{
  0%{transform:translate(-50%,-50%) scale(.4);opacity:0}
  60%{transform:translate(-50%,-50%) scale(1.25)}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}
@keyframes slot-glow{
  0%,100%{box-shadow:none}
  50%{box-shadow:0 0 18px 4px rgba(255,80,80,.55)}
}
.slot.win-flash .slot-panel{animation:slot-glow .5s ease 2}

/*
 * 牌位座標（% of 裁切後顯示區域，寬=1254px, 高=770px, 從原圖 y=30 開始）
 * 原圖座標 → 裁切比例：
 *   x% = x / 1254
 *   y% = (y_orig - 30) / 770
 *
 * 莊家 L形台階: orig(580, 192)  → (46%, 21%)
 * 順門 左側平台: orig(108, 435) → ( 9%, 53%)
 * 天門 噴泉下方: orig(478, 548) → (38%, 67%)
 * 地門 右側平台: orig(1110,415) → (89%, 50%)
 */
/*
 * 顯示區域：原圖 y=0~1100，容器 aspect 1254:1100
 * 菱形：莊家/天門對齊中軸(left:50%)；順門/地門同高；等距
 *   莊家  x=50% y=19%  → 頂端 L 形台階中央
 *   順門  x=13% y=66%  → 左側平台
 *   天門  x=50% y=80%  → 噴泉下方平台，與莊家同軸
 *   地門  x=87% y=66%  → 右側平台（與順門同高）
 */
#slot-dealer{left:50%;top:19%}
#slot-shun  {left:13%;top:66%}
#slot-tian  {left:50%;top:80%}
#slot-di    {left:87%;top:66%}

/* ── MAP OVERLAYS ── */
#bet-banner-map{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.55);
  text-align:center;
  padding:5px;
  font-size:15px;font-weight:bold;
  color:#fff;letter-spacing:1px;
  z-index:15;
  pointer-events:none;
}

#dice-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  z-index:50;
}
.dice-row{display:flex;gap:20px}
.die{
  width:60px;height:60px;
  background:#fff;border-radius:10px;border:2px solid #ddd;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
  animation:die-in .45s cubic-bezier(.22,1,.36,1);
}
@keyframes die-in{0%{transform:scale(.2) rotate(-180deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.dice-total{color:#ffd700;font-size:15px;font-weight:bold;text-shadow:0 1px 4px rgba(0,0,0,.8)}

#start-bet-overlay{
  position:absolute;inset:0;
  display:none;
  align-items:center;justify-content:center;
  z-index:30;pointer-events:none;
}
.start-bet-sign{
  padding:14px 36px;
  background:rgba(0,0,0,.75);
  border:2px solid #ffd700;border-radius:16px;
  color:#ffd700;font-size:28px;font-weight:900;
  text-shadow:0 0 20px rgba(255,215,0,.9);
  animation:sign-pulse .8s ease-in-out infinite alternate;
}
@keyframes sign-pulse{from{transform:scale(1);opacity:.9}to{transform:scale(1.06);opacity:1}}

/* ── BOTTOM CONTROLS ── */
#controls{
  background:linear-gradient(180deg,#2a1a40,#1e1030);
  flex-shrink:0;
  display:flex;flex-direction:column;
}

#actions{
  display:flex;gap:6px;padding:6px 8px 4px;
}
.act-btn{
  flex:1;padding:10px 2px;
  border:none;border-radius:22px;
  font-size:13px;font-weight:bold;cursor:pointer;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
  transition:opacity .15s;
}
.act-btn:disabled,.act-btn.off{opacity:.35;cursor:not-allowed}
.btn-next{background:linear-gradient(180deg,#5bbfbf,#2a8888)}
.btn-cancel{background:linear-gradient(180deg,#f8a040,#c06810)}
.btn-confirm{background:linear-gradient(180deg,#66cc55,#358824)}

#chips-area{
  display:flex;gap:6px;padding:2px 8px 6px;align-items:center;
}
.chip-btn{
  flex:1;padding:8px 2px;
  border:none;border-radius:22px;
  font-size:13px;font-weight:bold;cursor:pointer;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
}
.chip-more{background:linear-gradient(180deg,#66aa77,#3a6644);font-size:12px}
.chip-val{background:linear-gradient(180deg,#dd77aa,#994466)}
.chip-val.sel{box-shadow:0 0 0 3px #ffd700,0 0 8px rgba(255,215,0,.5)}
.chip-repeat{background:linear-gradient(180deg,#dd5533,#aa2211)}
.chip-repeat.off{opacity:.35;cursor:not-allowed}

/* ── TREND BOARD ── */
#trend-board{
  background:rgba(0,0,0,.75);
  padding:4px 8px;
  display:flex;flex-direction:column;gap:3px;
  flex-shrink:0;
}
.trend-row{display:flex;align-items:center;gap:3px}
.trend-label{color:#ffe;font-size:11px;width:28px;flex-shrink:0}
.trend-cells{flex:1;display:flex;gap:2px;overflow:hidden}
.tcell{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;line-height:1}
.tcell.tw{color:#ff4444}
.tcell.tl{color:#44cc44}
.tcell.te{color:rgba(255,255,255,.2);font-size:11px}
.trend-open-btn{display:flex;flex-direction:column;align-items:center;color:#ffd700;font-size:10px;cursor:pointer;margin-left:4px;flex-shrink:0;gap:1px}
.trend-open-btn:hover{color:#fff}

/* ── PLAYER BAR ── */
#player-bar{
  display:flex;align-items:center;gap:10px;
  padding:6px 12px;
  background:rgba(0,0,0,.85);flex-shrink:0;
}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#4488ff,#44ffcc);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid rgba(255,255,255,.2)}
.player-info{flex:1}
.player-id{font-size:11px;color:#888}
.player-bal{font-size:16px;font-weight:bold;color:#ffd700}
.auto-btn{padding:9px 14px;border:none;border-radius:22px;font-size:12px;font-weight:bold;cursor:pointer;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);background:linear-gradient(180deg,#dd5533,#aa2211);white-space:nowrap}
.auto-btn.on{background:linear-gradient(180deg,#44cc44,#229922)}

/* ── SIDEBAR ── */
#sidebar{
  position:absolute;left:0;top:0;bottom:0;width:64px;
  background:rgba(0,0,0,.78);
  display:none;flex-direction:column;justify-content:center;gap:16px;align-items:center;
  z-index:200;padding:20px 0;
  backdrop-filter:blur(4px);
}
.side-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#ffd700;font-size:11px;text-shadow:0 1px 3px rgba(0,0,0,.8);padding:8px 0;width:100%;transition:background .15s}
.side-btn:hover{background:rgba(255,255,255,.1)}
.side-btn .ico{font-size:22px}

/* ── TOAST ── */
#toast{position:fixed;top:54px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.87);color:#fff;padding:8px 22px;border-radius:22px;font-size:13px;z-index:9000;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:5000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff9e8;border-radius:14px;width:100%;max-width:390px;max-height:88vh;overflow-y:auto;position:relative;padding:16px 16px 20px}
.modal-title{text-align:center;font-size:18px;font-weight:bold;color:#6a0080;padding-bottom:10px;margin-bottom:12px;border-bottom:2px solid rgba(106,0,128,.2)}
.modal-close{position:absolute;right:12px;top:12px;font-size:18px;cursor:pointer;color:#888;background:none;border:none;line-height:1}
.modal-close:hover{color:#333}
.rule-body{font-size:13px;color:#333;line-height:1.8}
.rule-body h4{color:#6a0080;margin:10px 0 4px}
.rule-body .hl{color:#cc2200;font-weight:bold}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee}
.settings-row label{font-size:14px;color:#444}
input[type=range]{flex:1;margin:0 12px;accent-color:#6a0080}
.chip-edit-wrap{display:flex;gap:10px;margin-top:14px}
.chip-edit-group{flex:1;display:flex;flex-direction:column;gap:5px}
.chip-edit-group label{font-size:12px;color:#666;text-align:center}
.chip-edit-group input{border:1.5px solid #ccc;border-radius:8px;padding:8px 4px;font-size:15px;text-align:center;width:100%}
.modal-save-btn{margin-top:14px;width:100%;padding:12px;background:#6a0080;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer}
.modal-save-btn:hover{background:#880099}
.hist-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.hist-table th{color:#6a0080;padding:6px 3px;border-bottom:2px solid #ddd;font-size:11px}
.hist-table td{padding:5px 3px;text-align:center;border-bottom:1px solid #f0e8e8}
.hist-win td{color:#009900}
.hist-lose td{color:#cc0000}
.hist-empty{text-align:center;padding:24px;color:#aaa;font-size:13px}
.trend-stat-zone{margin-bottom:14px}
.trend-stat-zone h4{font-size:14px;color:#6a0080;margin-bottom:6px}
.trend-pct{font-size:12px;color:#666;margin-bottom:5px}
.trend-dots{display:flex;flex-wrap:wrap;gap:2px}
.trend-dot{font-size:13px;font-weight:bold}
.trend-dot.w{color:#cc2200}
.trend-dot.l{color:#229922}

/* ── CARDS ── */
/* clamp: 在 440px 容器→38px，375px→32px，縮放比 8.6vw */
.card{width:clamp(28px,8.6vw,38px);height:clamp(40px,12.3vw,54px);border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.6);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-back{background:#1d6b14}
.card-face{background:#fff;border:1px solid #ccc}
.card svg{width:100%;height:100%;display:block}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.shake{animation:shake .3s ease}
@keyframes tianwang-glow{0%,100%{filter:drop-shadow(0 0 6px rgba(255,215,0,.6))}50%{filter:drop-shadow(0 0 18px rgba(255,215,0,1))}}
.tianwang-card{animation:tianwang-glow .6s ease 4}
</style>
</head>
<body>
<div id="game">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="color:#ffd700;font-size:14px;font-weight:900;letter-spacing:2px">推筒子 Ⅱ</span>
      <span class="shoe-label" id="shoe-label" style="color:rgba(255,255,255,.5);font-size:10px">第1/5局</span>
      <div style="width:60px;height:8px;background:rgba(0,0,0,.4);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.2)">
        <div id="shoe-fill" style="height:100%;width:100%;background:linear-gradient(90deg,#44ff44,#00cc00);border-radius:4px;transition:width .5s"></div>
      </div>
    </div>
    <div class="bet-info">
      最小:<span id="s-min">1</span> 最大:<span id="s-max">150,000</span><br>
      當前下注:<span id="s-cur">0</span>
    </div>
  </div>

  <!-- MAP AREA -->
  <div id="map-area">
    <img src="bg.jpg" id="bg-img" draggable="false">

    <!-- Dealer slot -->
    <div class="slot" id="slot-dealer">
      <div class="slot-panel">
        <div class="slot-label dealer-lbl">莊　家</div>
        <div class="slot-cards" id="dealer-cards"></div>
        <div class="slot-score" id="dealer-score"></div>
      </div>
    </div>

    <!-- 順門 -->
    <div class="slot bettable" id="slot-shun" onclick="placeBet('shun')">
      <div class="slot-panel">
        <div class="slot-label">順　門</div>
        <div class="slot-cards" id="cards-shun"></div>
        <div class="slot-score" id="score-shun"></div>
        <div class="slot-bet-box" id="bet-shun">0</div>
      </div>
    </div>

    <!-- 天門 -->
    <div class="slot bettable" id="slot-tian" onclick="placeBet('tian')">
      <div class="slot-panel">
        <div class="slot-label">天　門</div>
        <div class="slot-cards" id="cards-tian"></div>
        <div class="slot-score" id="score-tian"></div>
        <div class="slot-bet-box" id="bet-tian">0</div>
      </div>
    </div>

    <!-- 地門 -->
    <div class="slot bettable" id="slot-di" onclick="placeBet('di')">
      <div class="slot-panel">
        <div class="slot-label">地　門</div>
        <div class="slot-cards" id="cards-di"></div>
        <div class="slot-score" id="score-di"></div>
        <div class="slot-bet-box" id="bet-di">0</div>
      </div>
    </div>

    <!-- Map overlays -->
    <div id="bet-banner-map">請下注</div>

    <div id="dice-overlay">
      <div class="dice-row" id="dice-row"></div>
      <div class="dice-total" id="dice-total"></div>
    </div>

    <div id="start-bet-overlay">
      <div class="start-bet-sign">開始下注</div>
    </div>
  </div><!-- /map-area -->

  <!-- BOTTOM CONTROLS -->
  <div id="controls">
    <div id="actions">
      <button class="act-btn btn-next off" id="btn-next" onclick="nextRound()">下一局</button>
      <button class="act-btn btn-cancel off" id="btn-cancel" onclick="cancelBet()">取消下注</button>
      <button class="act-btn btn-confirm off" id="btn-confirm" onclick="confirmBet()">確認下注</button>
    </div>
    <div id="chips-area">
      <button class="chip-btn chip-more" onclick="openChipEditor()">更多</button>
      <button class="chip-btn chip-val" id="cv0" onclick="selectChip(0)">1</button>
      <button class="chip-btn chip-val" id="cv1" onclick="selectChip(1)">2</button>
      <button class="chip-btn chip-val" id="cv2" onclick="selectChip(2)">5</button>
      <button class="chip-btn chip-repeat off" id="btn-repeat" onclick="repeatBet()">重複</button>
    </div>
  </div>

  <!-- TREND BOARD -->
  <div id="trend-board">
    <div class="trend-row">
      <span class="trend-label">順門</span>
      <div class="trend-cells" id="tr-shun"></div>
      <div class="trend-open-btn" onclick="openTrendPanel()">
        <span style="font-size:16px">📊</span><span>走勢</span>
      </div>
    </div>
    <div class="trend-row">
      <span class="trend-label">天門</span>
      <div class="trend-cells" id="tr-tian"></div>
    </div>
    <div class="trend-row">
      <span class="trend-label">地門</span>
      <div class="trend-cells" id="tr-di"></div>
    </div>
  </div>

  <!-- PLAYER BAR -->
  <div id="player-bar">
    <div class="avatar" id="avatar">🧑</div>
    <div class="player-info">
      <div class="player-id" id="player-id">1a91023700</div>
      <div class="player-bal" id="player-bal">10,000.00</div>
    </div>
    <button class="auto-btn" id="auto-btn" onclick="toggleAutoBet()">自動下注</button>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="side-btn" onclick="openSettings()"><span class="ico">⚙️</span><span>設置</span></div>
    <div class="side-btn" onclick="openRules()"><span class="ico">📋</span><span>規則</span></div>
    <div class="side-btn" onclick="openHistory()"><span class="ico">📜</span><span>記錄</span></div>
  </div>

</div><!-- /game -->

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const MIN_BET=1,MAX_BET=150000,INIT_BAL=10000,ROUNDS_PER_SHOE=5;
const ZONE_KEYS=['shun','tian','di'];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let G={
  phase:'IDLE',
  deck:[],roundInShoe:0,
  hands:{dealer:[],shun:[],tian:[],di:[]},
  bets:{shun:0,tian:0,di:0},
  lastBets:{shun:0,tian:0,di:0},
  results:{shun:null,tian:null,di:null},
  balance:INIT_BAL,
  chips:[1,2,5],selChip:0,
  autoBet:false,canRepeat:false,
  history:[],trends:[],
  musicVol:.5,sfxVol:.8,
};

// ═══════════════════════════════════════════════
// DECK
// ═══════════════════════════════════════════════
const NUM=['','一','二','三','四','五','六','七','八','九'];
function createDeck(){
  const d=[];
  for(let v=1;v<=9;v++) for(let i=0;i<4;i++) d.push({value:v,type:'tong',label:NUM[v]+'筒'});
  for(let i=0;i<4;i++) d.push({value:.5,type:'blank',label:'白板'});
  return d;
}
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

// ═══════════════════════════════════════════════
// HAND EVALUATION
// ═══════════════════════════════════════════════
function calcPoints(c){
  const s=c[0].value+c[1].value;
  return Math.floor(s)%10+((s%1)>=.5?.5:0);
}
function evalHand(c){
  const[a,b]=c;
  if(a.type==='blank'&&b.type==='blank') return{rank:'tianwang',pairVal:null,points:0};
  if(a.type==='tong'&&b.type==='tong'&&a.value===b.value) return{rank:'pair',pairVal:a.value,points:0};
  const p=calcPoints(c);
  if(p===0) return{rank:'bieshi',pairVal:null,points:0};
  return{rank:'points',pairVal:null,points:p};
}
const RW={tianwang:4,pair:3,points:2,bieshi:1};
function playerBeatsDealer(pc,dc){
  const p=evalHand(pc),d=evalHand(dc);
  if(RW[p.rank]>RW[d.rank]) return true;
  if(RW[p.rank]<RW[d.rank]) return false;
  if(p.rank==='tianwang'||p.rank==='bieshi') return false;
  if(p.rank==='pair'){return p.pairVal>d.pairVal;}
  if(p.points!==d.points) return p.points>d.points;
  return Math.max(pc[0].value,pc[1].value)>Math.max(dc[0].value,dc[1].value);
}
function handLabel(c){
  const h=evalHand(c);
  if(h.rank==='tianwang') return'天王';
  if(h.rank==='pair') return NUM[h.pairVal]+'寶';
  if(h.rank==='bieshi') return'鱉十';
  const i=Math.floor(h.points),half=(h.points%1)>=.5;
  return NUM[i]+'點'+(half?'半':'');
}

// ═══════════════════════════════════════════════
// CARD SVG
// ═══════════════════════════════════════════════
const PIPS={
  1:[[50,50]],
  2:[[50,27],[50,73]],
  3:[[72,21],[50,50],[28,79]],
  4:[[28,27],[72,27],[28,73],[72,73]],
  5:[[28,22],[72,22],[50,50],[28,78],[72,78]],
  6:[[28,18],[72,18],[28,50],[72,50],[28,82],[72,82]],
  7:[[28,14],[72,14],[28,43],[72,43],[50,57],[28,86],[72,86]],
  8:[[28,12],[72,12],[28,37],[72,37],[28,62],[72,62],[28,87],[72,87]],
  9:[[24,17],[50,17],[76,17],[24,50],[50,50],[76,50],[24,83],[50,83],[76,83]],
};
const PC=['#cc2222','#228833','#cc2222','#228833','#cc2222','#228833','#cc2222','#228833','#cc2222'];
function cardFaceSVG(card){
  const W=38,H=54;
  if(card.type==='blank'){
    return`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <rect width="${W}" height="${H}" rx="3" fill="#f8f8f2" stroke="#aaa" stroke-width="1"/>
      <rect x="2.5" y="2.5" width="${W-5}" height="${H-5}" rx="2" fill="none" stroke="#ccc" stroke-width="1"/>
      <text x="${W/2}" y="${H*.58}" text-anchor="middle" font-size="14" fill="#aaa" font-family="serif" font-weight="bold">白</text>
      <text x="${W/2}" y="${H*.77}" text-anchor="middle" font-size="8" fill="#bbb" font-family="serif">板</text>
    </svg>`;
  }
  const v=card.value,pos=PIPS[v]||[];
  const r=v===1?10:v<=2?8:v<=5?7:6;
  const pips=pos.map((p,i)=>{
    const cx=p[0]*W/100,cy=p[1]*H/100,col=PC[i],dk=col==='#cc2222'?'#990000':'#005500';
    if(v===1) return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" stroke="${dk}" stroke-width="1.5"/>
      <circle cx="${cx}" cy="${cy}" r="${r*.55}" fill="rgba(255,255,255,.35)"/>
      <circle cx="${cx}" cy="${cy}" r="${r*.2}" fill="rgba(255,255,255,.6)"/>`;
    return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" stroke="${dk}" stroke-width=".8"/>
      <circle cx="${cx}" cy="${cy}" r="${r*.45}" fill="rgba(255,255,255,.28)"/>`;
  }).join('');
  return`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${W}" height="${H}" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
    ${pips}
    <text x="2" y="9" font-size="7" fill="#bbb" font-family="sans-serif">${card.label}</text>
  </svg>`;
}
function cardBackSVG(){
  return`<svg viewBox="0 0 38 54" xmlns="http://www.w3.org/2000/svg">
    <defs><pattern id="bp" patternUnits="userSpaceOnUse" width="7" height="7">
      <line x1="0" y1="0" x2="7" y2="7" stroke="rgba(255,255,255,.07)" stroke-width="1"/>
      <line x1="7" y1="0" x2="0" y2="7" stroke="rgba(255,255,255,.07)" stroke-width="1"/>
    </pattern></defs>
    <rect width="38" height="54" rx="3" fill="#1d6b14"/>
    <rect x="2" y="2" width="34" height="50" rx="2" fill="#1a5e12"/>
    <rect x="2" y="2" width="34" height="50" rx="2" fill="url(#bp)"/>
  </svg>`;
}
function makeCard(card,faceDown){
  const d=document.createElement('div');
  d.className='card '+(faceDown?'card-back':'card-face');
  d.innerHTML=faceDown?cardBackSVG():cardFaceSVG(card);
  return d;
}

// ═══════════════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════════════
function initShoe(){
  G.deck=shuffle(createDeck());G.roundInShoe=0;
  toast('新靴開始，洗牌完成！');
}
function startNewRound(){
  G.phase='DEAL_PREP';
  G.hands={dealer:[],shun:[],tian:[],di:[]};
  G.bets={shun:0,tian:0,di:0};
  G.results={shun:null,tian:null,di:null};
  clearResultBadges();clearCards();clearScores();
  renderBets();updateCurrentBet();renderButtons();
  showDice();
}
function showDice(){
  const d1=Math.ceil(Math.random()*6),d2=Math.ceil(Math.random()*6);
  const E=['⚀','⚁','⚂','⚃','⚄','⚅'];
  const row=document.getElementById('dice-row');row.innerHTML='';
  [d1,d2].forEach(d=>{const el=document.createElement('div');el.className='die';el.textContent=E[d-1];row.appendChild(el);});
  document.getElementById('dice-total').textContent=`骰子點數：${d1+d2}`;
  const ov=document.getElementById('dice-overlay');ov.style.display='flex';
  setTimeout(()=>{ov.style.display='none';dealCards();},1600);
}
function dealCards(){
  ['dealer','shun','tian','di'].forEach(p=>{G.hands[p]=[G.deck.pop(),G.deck.pop()];});
  G.roundInShoe++;updateShoeBar();
  renderCards(true);
  G.phase='BETTING';
  if(G.autoBet&&canDoAutoRepeat()){
    setTimeout(()=>{G.bets={...G.lastBets};renderBets();updateCurrentBet();setTimeout(confirmBet,600);},400);
  } else {
    flashStartBet();renderButtons();
  }
}
function flashStartBet(){
  const el=document.getElementById('start-bet-overlay');el.style.display='flex';
  setTimeout(()=>{el.style.display='none';},1100);
}
function placeBet(zone){
  if(G.phase!=='BETTING') return;
  const amt=G.chips[G.selChip];
  if(G.bets[zone]+amt>MAX_BET){toast('超過最大下注限制');return;}
  if(G.bets.shun+G.bets.tian+G.bets.di+amt>G.balance){toast('餘額不足');return;}
  G.bets[zone]+=amt;renderBets();updateCurrentBet();
}
function cancelBet(){
  if(G.phase!=='BETTING') return;
  G.bets={shun:0,tian:0,di:0};renderBets();updateCurrentBet();
}
function confirmBet(){
  if(G.phase!=='BETTING') return;
  const tot=G.bets.shun+G.bets.tian+G.bets.di;
  if(tot<MIN_BET){
    toast('請先在任一區域下注');
    document.getElementById('map-area').classList.add('shake');
    setTimeout(()=>document.getElementById('map-area').classList.remove('shake'),400);
    return;
  }
  G.phase='REVEAL';renderButtons();setBanner('開牌中...');
  setTimeout(()=>{renderCards(false);setTimeout(settle,700);},200);
}
function settle(){
  G.phase='SETTLEMENT';
  let delta=0;
  ZONE_KEYS.forEach(z=>{
    const bet=G.bets[z];if(!bet){G.results[z]=null;return;}
    const won=playerBeatsDealer(G.hands[z],G.hands.dealer);
    G.results[z]=won?'win':'lose';
    delta+=won?bet:-bet;
    const ts=new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'});
    G.history.unshift({order_id:`1a91023700_${Date.now()}_${z}`,timestamp:ts,
      bet_area:{shun:'順門',tian:'天門',di:'地門'}[z],
      bet_amount:bet,payout:won?bet*2:0,net_win_loss:won?`+${bet}`:`-${bet}`});
  });
  G.history=G.history.slice(0,100);
  G.balance=Math.max(0,G.balance+delta);
  G.trends.unshift({shun:G.results.shun==='win',tian:G.results.tian==='win',di:G.results.di==='win'});
  G.trends=G.trends.slice(0,100);
  G.lastBets={...G.bets};G.canRepeat=true;
  if(G.autoBet&&G.balance<MIN_BET){G.autoBet=false;toast('餘額不足，自動下注已關閉');}
  renderResultBadges();renderButtons();renderTrend();renderBalance();setBanner('結算完成');
  if(G.autoBet) setTimeout(nextRound,1800);
}
function nextRound(){
  if(G.phase!=='SETTLEMENT') return;
  if(!G.autoBet) G.canRepeat=false;
  if(G.roundInShoe>=ROUNDS_PER_SHOE) initShoe();
  startNewRound();
}
function repeatBet(){
  if(G.phase!=='BETTING'||!G.canRepeat) return;
  const tot=G.lastBets.shun+G.lastBets.tian+G.lastBets.di;
  if(!tot){toast('沒有上局下注紀錄');return;}
  if(tot>G.balance){toast('餘額不足');return;}
  G.bets={...G.lastBets};renderBets();updateCurrentBet();
}
function canDoAutoRepeat(){
  const tot=G.lastBets.shun+G.lastBets.tian+G.lastBets.di;
  return tot>0&&tot<=G.balance;
}
function selectChip(i){G.selChip=i;renderChips();}
function toggleAutoBet(){
  if(!G.autoBet&&G.balance<MIN_BET){toast('餘額不足');return;}
  G.autoBet=!G.autoBet;
  document.getElementById('auto-btn').classList.toggle('on',G.autoBet);
  if(G.autoBet){
    if(G.phase==='BETTING'&&canDoAutoRepeat()){
      G.bets={...G.lastBets};renderBets();updateCurrentBet();setTimeout(confirmBet,500);
    } else if(G.phase==='BETTING'){
      toast('請先手動下注確認一局，之後將自動重複');
    }
  }
}

// ═══════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════
function setBanner(t){document.getElementById('bet-banner-map').textContent=t;}
function clearCards(){
  ['dealer-cards','cards-shun','cards-tian','cards-di'].forEach(id=>{document.getElementById(id).innerHTML='';});
  document.getElementById('dealer-score').textContent='';
}
function clearScores(){ZONE_KEYS.forEach(z=>{document.getElementById('score-'+z).textContent='';});}
function renderCards(faceDown){
  const map={dealer:'dealer-cards',shun:'cards-shun',tian:'cards-tian',di:'cards-di'};
  Object.entries(map).forEach(([pos,elId])=>{
    const el=document.getElementById(elId);el.innerHTML='';
    G.hands[pos].forEach(c=>el.appendChild(makeCard(c,faceDown)));
  });
  if(!faceDown){
    document.getElementById('dealer-score').textContent=handLabel(G.hands.dealer);
    if(evalHand(G.hands.dealer).rank==='tianwang')
      document.querySelectorAll('#dealer-cards .card').forEach(c=>c.classList.add('tianwang-card'));
    ZONE_KEYS.forEach(z=>{
      document.getElementById('score-'+z).textContent=handLabel(G.hands[z]);
      if(evalHand(G.hands[z]).rank==='tianwang')
        document.querySelectorAll(`#cards-${z} .card`).forEach(c=>c.classList.add('tianwang-card'));
    });
  }
}
function renderResultBadges(){
  clearResultBadges();
  ZONE_KEYS.forEach(z=>{
    if(!G.results[z]) return;
    const panel=document.querySelector(`#slot-${z} .slot-panel`);
    const badge=document.createElement('div');
    badge.className='result-badge '+(G.results[z]==='win'?'win':'lose');
    badge.textContent=G.results[z]==='win'?'贏':'輸';
    panel.style.position='relative';
    panel.appendChild(badge);
    if(G.results[z]==='win') document.getElementById('slot-'+z).classList.add('win-flash');
  });
}
function clearResultBadges(){
  document.querySelectorAll('.result-badge').forEach(el=>el.remove());
  ZONE_KEYS.forEach(z=>document.getElementById('slot-'+z).classList.remove('win-flash'));
}
function renderBets(){
  ZONE_KEYS.forEach(z=>{const b=G.bets[z];document.getElementById('bet-'+z).textContent=b?b.toLocaleString():'0';});
}
function updateCurrentBet(){
  document.getElementById('s-cur').textContent=(G.bets.shun+G.bets.tian+G.bets.di).toLocaleString();
}
function renderBalance(){
  document.getElementById('player-bal').textContent=G.balance.toLocaleString('zh-TW',{minimumFractionDigits:2});
}
function updateShoeBar(){
  const rem=ROUNDS_PER_SHOE-G.roundInShoe;
  document.getElementById('shoe-fill').style.width=(rem/ROUNDS_PER_SHOE*100)+'%';
  document.getElementById('shoe-label').textContent=`第${G.roundInShoe}/${ROUNDS_PER_SHOE}局`;
}
function renderButtons(){
  const isBet=G.phase==='BETTING',isSett=G.phase==='SETTLEMENT';
  const canRep=isBet&&G.canRepeat&&(G.lastBets.shun+G.lastBets.tian+G.lastBets.di)>0;
  [['btn-next',isSett],['btn-cancel',isBet],['btn-confirm',isBet]].forEach(([id,on])=>{
    const el=document.getElementById(id);el.disabled=!on;el.classList.toggle('off',!on);
  });
  const rep=document.getElementById('btn-repeat');rep.disabled=!canRep;rep.classList.toggle('off',!canRep);
  ZONE_KEYS.forEach(z=>{
    const el=document.getElementById('slot-'+z);
    el.classList.toggle('bettable',isBet);
  });
  document.getElementById('auto-btn').classList.toggle('on',G.autoBet);
  setBanner(isBet?'請下注':isSett?'結算完成':G.phase==='DEAL_PREP'?'發牌中...':'開牌中...');
}
function renderChips(){
  G.chips.forEach((v,i)=>{
    const el=document.getElementById('cv'+i);
    el.textContent=v>=10000?(v/10000)+'萬':v>=1000?(v/1000)+'K':v;
    el.classList.toggle('sel',i===G.selChip);
  });
}
function renderTrend(){
  const DISP=9;
  ZONE_KEYS.forEach(z=>{
    const el=document.getElementById('tr-'+z);el.innerHTML='';
    const recent=G.trends.slice(0,DISP).reverse();
    recent.forEach(r=>{const c=document.createElement('div');c.className='tcell '+(r[z]?'tw':'tl');c.textContent=r[z]?'✓':'✗';el.appendChild(c);});
    for(let i=recent.length;i<DISP;i++){const c=document.createElement('div');c.className='tcell te';c.textContent='-';el.appendChild(c);}
  });
}

// ═══════════════════════════════════════════════
// SIDEBAR & MODALS
// ═══════════════════════════════════════════════
let sidebarOpen=false;
function toggleSidebar(){sidebarOpen=!sidebarOpen;document.getElementById('sidebar').style.display=sidebarOpen?'flex':'none';}
function closeSidebar(){sidebarOpen=false;document.getElementById('sidebar').style.display='none';}
function openModal(title,html){
  closeModal();closeSidebar();
  const ov=document.createElement('div');ov.className='overlay';ov.id='modal-overlay';
  ov.onclick=e=>{if(e.target===ov)closeModal();};
  const m=document.createElement('div');m.className='modal';
  m.innerHTML=`<div class="modal-title">${title}</div><button class="modal-close" onclick="closeModal()">✕</button>${html}`;
  ov.appendChild(m);document.body.appendChild(ov);return m;
}
function closeModal(){const el=document.getElementById('modal-overlay');if(el)el.remove();}

function openSettings(){
  openModal('設置',`
    <div class="settings-row"><label>🎵 背景音樂</label><input type="range" min="0" max="1" step="0.05" value="${G.musicVol}" oninput="G.musicVol=+this.value"></div>
    <div class="settings-row"><label>🔊 音效</label><input type="range" min="0" max="1" step="0.05" value="${G.sfxVol}" oninput="G.sfxVol=+this.value"></div>
  `);
}
function openChipEditor(){
  openModal('籌碼設定',`
    <p style="font-size:13px;color:#666;margin-bottom:4px">自訂三種籌碼面額：</p>
    <div class="chip-edit-wrap">
      ${[0,1,2].map(i=>`<div class="chip-edit-group"><label>籌碼${i+1}</label><input type="number" id="cinp${i}" value="${G.chips[i]}" min="1" max="${MAX_BET}"></div>`).join('')}
    </div>
    <button class="modal-save-btn" onclick="saveChips()">確認</button>
  `);
}
function saveChips(){
  G.chips=[0,1,2].map(i=>{const v=parseInt(document.getElementById('cinp'+i).value);return(isNaN(v)||v<1)?G.chips[i]:Math.min(v,MAX_BET);});
  renderChips();closeModal();toast('籌碼已更新');
}
function openRules(){
  openModal('遊戲說明',`
    <div class="rule-body">
      <h4>❶ 遊戲玩法</h4><p>40 張牌（一~九筒各4張＋白板4張），莊家 vs 順門/天門/地門。</p>
      <h4>❷ 點數計算</h4><p>兩張相加取個位數。白板 = 0.5點。合計0點稱<span class="hl">鱉十</span>。</p>
      <h4>❸ 牌型排名</h4><p><span class="hl">天王</span>（白板對）＞<span class="hl">對子</span>（九寶…一寶）＞<span class="hl">點數</span>（九點半…一點）＞<span class="hl">鱉十</span></p>
      <h4>❹ 勝負</h4><p>先比牌型→比點數→比最大單張。<span class="hl">任何平手均莊家勝，無和局。</span></p>
      <h4>❺ 結算</h4><p>贏：1賠1。輸：扣注金。</p>
    </div>
  `);
}
function openHistory(){
  const rows=G.history.length?G.history.map(r=>`<tr class="${r.net_win_loss.startsWith('+')?'hist-win':'hist-lose'}"><td style="font-size:10px">${r.order_id.slice(-6)}</td><td>${r.bet_area}</td><td>${r.bet_amount.toLocaleString()}</td><td>${r.payout.toLocaleString()}</td><td>${r.net_win_loss}</td></tr>`).join('')
    :`<tr><td colspan="5" class="hist-empty">暫無下注紀錄</td></tr>`;
  openModal('紀錄',`
    <p style="font-size:11px;color:#999;margin-bottom:8px">查詢時間：UTC+8</p>
    <table class="hist-table"><thead><tr><th>注單</th><th>投注</th><th>下注</th><th>派彩</th><th>輸贏</th></tr></thead><tbody>${rows}</tbody></table>
  `);
}
function openTrendPanel(){
  if(!G.trends.length){openModal('走勢統計','<p style="text-align:center;padding:24px;color:#aaa">尚無資料</p>');return;}
  const zn={shun:'順門',tian:'天門',di:'地門'};
  const html=ZONE_KEYS.map(z=>{
    const wins=G.trends.filter(r=>r[z]).length,tot=G.trends.length,pct=((wins/tot)*100).toFixed(1);
    return`<div class="trend-stat-zone"><h4>${zn[z]}</h4><div class="trend-pct">勝率${pct}%（${wins}勝/${tot}局）</div>
      <div class="trend-dots">${G.trends.map(r=>`<span class="trend-dot ${r[z]?'w':'l'}">${r[z]?'✓':'✗'}</span>`).join('')}</div></div>`;
  }).join('');
  openModal('走勢統計',html);
}

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
let _tt=null;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';clearTimeout(_tt);_tt=setTimeout(()=>{el.style.opacity='0';},2200);}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  document.getElementById('s-min').textContent=MIN_BET.toLocaleString();
  document.getElementById('s-max').textContent=MAX_BET.toLocaleString();
  renderChips();renderBalance();renderTrend();
  document.getElementById('game').addEventListener('click',e=>{
    if(sidebarOpen&&!e.target.closest('#sidebar')&&!e.target.closest('.menu-icon')) closeSidebar();
  });
  initShoe();startNewRound();
}
window.addEventListener('load',init);
</script>
